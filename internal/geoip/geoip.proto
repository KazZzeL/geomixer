syntax = "proto3";

package internal.geoip;
option go_package = "github.com/KazZzeL/geomixer/internal/geoip";

message CIDR {
  // IP address, should be either 4 or 16 bytes.
  bytes ip = 1;

  // Number of leading ones in the network mask.
  uint32 prefix = 2;
}

message Category {
  string name = 1;
  repeated CIDR cidr = 2;
}

message GeoIP {
  repeated Category categories = 1;
}
